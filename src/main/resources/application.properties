server.port=8081

logging.level.root=INFO
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=10

# Gateway service-to-service config
gateway.url=${GATEWAY_URL:http://localhost:8080}
gateway.servicekey=${GATEWAY_SERVICEKEY}

# JWT validation (shared secret with gateway)
jwt.secret=${JWT_SECRET}

# CORS
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:4173}

# Server capacity (Fly.io env vars auto-detected in production)
server.machine-id=${FLY_MACHINE_ID:local}
server.region=${FLY_REGION:local}
server.max-concurrent-games=${MAX_CONCURRENT_GAMES:20}