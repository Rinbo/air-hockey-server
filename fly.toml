# fly.toml — Air Hockey Game Server
app = "air-hockey-server"
primary_region = "arn"

[build]

[http_service]
  internal_port = 8081
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = false  # flip to true when matchmaking is ready (Phase 3)
  min_machines_running = 0

[[vm]]
  size = "performance-1x"
  memory = "2gb"
