# fly.toml — Air Hockey Game Server
app = "air-hockey-server"
primary_region = "arn"

[build]

[http_service]
  internal_port = 8081
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[checks]
  [checks.health]
    type = "tcp"
    port = 8081
    interval = "10s"
    timeout = "2s"

[[vm]]
  size = "performance-1x"
  memory = "2gb"
